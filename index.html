<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark" />
    <title>UnreaL LastChaoS Launcher</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="launcher-shell" data-state="ready" data-auth="guest">
      <section class="hero-pane" data-i18n-attr="aria-label:aria.heroPane">
        <video class="hero-backdrop" autoplay muted loop playsinline poster="./assets/media/hero-start-poster.webp">
          <source src="./assets/media/hero-start.mp4" type="video/mp4" />
        </video>
        <div class="hero-vignette"></div>

        <header class="topbar">
          <div class="brand-mark embossed-title" aria-label="UNREAL LAST CHAOS">
            <span class="title-line brand-top">
              <span class="title-back">UnreaL</span>
              <span class="title-front">UnreaL</span>
            </span>
            <span class="title-line brand-bottom">
              <span class="title-back">LastChaoS</span>
              <span class="title-front">LastChaoS</span>
            </span>
          </div>

          <nav class="top-actions" data-i18n-attr="aria-label:aria.topActions">
            <button class="icon-button" type="button" data-action="open-link" data-url="https://discord.com" aria-label="Discord">DS</button>
            <button class="icon-button" type="button" data-action="open-link" data-url="https://t.me" aria-label="Telegram">TG</button>
            <button class="icon-button" type="button" data-action="open-link" data-url="https://vk.com" aria-label="VK">VK</button>
            <div class="lang-switcher" id="langSwitcher">
              <button class="lang-trigger" type="button" data-action="locale-toggle" aria-label="Language" aria-expanded="false">
                <span id="localeLabel">RU</span>
              </button>
              <div class="lang-menu" role="menu" aria-label="Language list">
                <button type="button" class="lang-option is-active" data-action="locale-select" data-locale="ru">RU</button>
                <button type="button" class="lang-option" data-action="locale-select" data-locale="en">EN</button>
                <button type="button" class="lang-option" data-action="locale-select" data-locale="de">DE</button>
                <button type="button" class="lang-option" data-action="locale-select" data-locale="fr">FR</button>
                <button type="button" class="lang-option" data-action="locale-select" data-locale="ja">JA</button>
                <button type="button" class="lang-option" data-action="locale-select" data-locale="th">TH</button>
              </div>
            </div>
            <button class="window-button" type="button" data-action="minimize" data-i18n-attr="aria-label:aria.minimize"></button>
            <button class="window-button close" type="button" data-action="close" data-i18n-attr="aria-label:aria.close"></button>
          </nav>
        </header>

        <div class="hero-copy">
          <p class="eyebrow hero-tag-anim step-old" id="engineBadge" aria-live="polite">
            <span class="tag-line tag-line-morph">
              <span class="badge-slot">
                <span class="badge-reel">
                  <span id="badgeOld">Serious Engine 1.5</span>
                  <span id="badgeNew">Unreal Engine 5.7</span>
                </span>
              </span>
            </span>
          </p>
          <h1>
            <span data-i18n="hero.titleTop"></span>
            <span data-i18n="hero.titleBottom"></span>
          </h1>
          <p data-i18n="hero.subtitle"></p>
        </div>

        <aside class="status-card" data-i18n-attr="aria-label:aria.serverStatus">
          <div class="status-row">
            <span class="pulse-dot"></span>
            <span data-i18n="server.online"></span>
          </div>
          <strong>2 184</strong>
          <span data-i18n="server.players"></span>
        </aside>
      </section>

      <section class="control-pane" data-i18n-attr="aria-label:aria.controlPane">
        <div class="profile-strip">
          <img id="profileAvatar" src="./assets/cards/knight.png" alt="" />
          <div class="profile-copy">
            <span class="muted-label" id="profileLabel" data-i18n="account.guestLabel"></span>
            <strong id="profileName" data-i18n="account.guest"></strong>
            <small id="profileMeta" data-i18n="account.hint"></small>
          </div>
          <button class="small-button auth-button" type="button" data-action="login" data-i18n="account.login"></button>
        </div>

        <section class="news-panel" data-i18n-attr="aria-label:aria.news">
          <div class="panel-title">
            <span class="muted-label" data-i18n="news.title"></span>
            <button class="link-button" type="button" data-action="open-link" data-url="https://github.com/Zornigen/UnrealSite" data-i18n="news.all"></button>
          </div>
          <article class="news-item is-featured">
            <img src="./assets/cards/titan.png" alt="" />
            <div>
              <span data-i18n="news.items.0.kicker"></span>
              <strong data-i18n="news.items.0.title"></strong>
              <p data-i18n="news.items.0.text"></p>
            </div>
          </article>
          <article class="news-item">
            <img src="./assets/cards/mage.png" alt="" />
            <div>
              <span data-i18n="news.items.1.kicker"></span>
              <strong data-i18n="news.items.1.title"></strong>
            </div>
          </article>
        </section>

        <div class="patch-card">
          <div class="patch-heading">
            <div>
              <span class="muted-label" data-i18n="patch.versionLabel"></span>
              <strong id="versionLabel">0.9.12-live</strong>
            </div>
            <span class="build-badge" id="buildBadge" data-i18n="patch.readyBadge"></span>
          </div>

          <div class="progress-shell" data-i18n-attr="aria-label:aria.progress">
            <div class="progress-fill" id="progressFill"></div>
          </div>
          <div class="progress-meta">
            <span id="statusText" data-i18n="patch.readyStatus"></span>
            <span id="progressText">100%</span>
          </div>

          <div class="launcher-actions">
            <button class="secondary-button" type="button" data-action="verify" data-i18n="patch.verify"></button>
            <button class="play-button" type="button" data-action="play">
              <span data-i18n="patch.play"></span>
            </button>
          </div>
        </div>
      </section>

      <div class="auth-modal" id="authModal" aria-hidden="true">
        <div class="auth-backdrop" data-action="auth-close"></div>
        <form class="auth-dialog" id="authForm" role="dialog" aria-modal="true" data-i18n-attr="aria-label:auth.title">
          <div class="auth-heading">
            <div>
              <span class="muted-label" data-i18n="account.label"></span>
              <h2 data-i18n="auth.title"></h2>
            </div>
            <button class="window-button close" type="button" data-action="auth-close" data-i18n-attr="aria-label:aria.close"></button>
          </div>

          <label class="auth-field">
            <span data-i18n="auth.loginLabel"></span>
            <input id="authLogin" type="text" autocomplete="username" data-i18n-attr="placeholder:auth.loginPlaceholder" required />
          </label>

          <label class="auth-field">
            <span data-i18n="auth.passwordLabel"></span>
            <input id="authPassword" type="password" autocomplete="current-password" data-i18n-attr="placeholder:auth.passwordPlaceholder" required />
          </label>

          <p class="auth-note" data-i18n="auth.testNote"></p>

          <div class="auth-actions">
            <button class="secondary-button" type="button" data-action="auth-close" data-i18n="auth.cancel"></button>
            <button class="play-button" type="submit" data-i18n="auth.submit"></button>
          </div>
        </form>
      </div>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
